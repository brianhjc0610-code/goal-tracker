<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2026 目标追踪 · Balance · Diversify · Outstanding</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1: #0a0e1a;
    --bg-2: #0d1529;
    --bg-3: #111b33;
    --card-bg: rgba(255,255,255,0.06);
    --card-bg-hover: rgba(255,255,255,0.10);
    --card-border: rgba(255,255,255,0.08);
    --text-primary: #e2e8f0;
    --text-secondary: rgba(255,255,255,0.4);
    --text-dim: rgba(255,255,255,0.35);
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --cyan: #00d4ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 40%, var(--bg-3) 100%);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* ── Banner ── */
  .banner {
    background: linear-gradient(135deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    top: -40px; right: -20px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(0,212,255,0.08), transparent);
    border-radius: 50%;
  }
  .banner::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 80px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(167,139,250,0.06), transparent);
    border-radius: 50%;
  }
  .banner-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .banner-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .banner-title {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #00d4ff, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.03em;
  }
  .banner-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── Ring ── */
  .ring-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .ring-container {
    position: relative;
    width: 80px; height: 80px;
  }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    color: var(--cyan);
  }
  .ring-info {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .ring-info strong { color: var(--green); font-weight: 700; }

  /* ── Cards Grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .goal-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .goal-card:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .goal-card .glow {
    position: absolute;
    top: -20px; right: -20px;
    width: 70px; height: 70px;
    border-radius: 50%;
    pointer-events: none;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .card-left { display: flex; align-items: center; gap: 10px; }
  .card-icon { font-size: 22px; }
  .card-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .card-detail {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 2px;
    line-height: 1.4;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-percent {
    font-size: 20px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }
  .card-thinking {
    margin-top: 10px;
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* ── Progress Bar ── */
  .progress-bar {
    width: 100%;
    height: 7px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-suffix { font-size: 12px; font-weight: 400; opacity: 0.6; }
  .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* ── Detail View ── */
  .detail-view { display: none; }
  .detail-view.active { display: block; }
  .dashboard-view.hidden { display: none; }

  .back-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.14); }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .detail-title { font-size: 20px; font-weight: 800; }
  .detail-sub { font-size: 11px; color: var(--text-secondary); }

  .week-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .week-selector label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
  }
  .week-select {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  .week-today-btn {
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    border: 1px solid;
    background: transparent;
    transition: opacity 0.2s;
  }
  .week-today-btn:hover { opacity: 0.8; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) {
    .detail-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .banner-title { font-size: 18px; }
  }

  /* ── Editor Panel ── */
  .editor-panel {
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border-radius: 16px;
    padding: 22px;
  }
  .editor-goal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .editor-icon { font-size: 26px; }
  .editor-name { font-size: 16px; font-weight: 700; }
  .editor-detail { font-size: 11px; color: var(--text-secondary); }

  .slider-section { margin-bottom: 18px; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .slider-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; }
  .slider-value {
    font-size: 18px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }
  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
    border: 2px solid rgba(0,0,0,0.3);
  }

  .note-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 8px; }
  .note-textarea {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    font-family: inherit;
    min-height: 140px;
  }
  .note-textarea:focus { border-color: rgba(255,255,255,0.25); }
  .note-textarea::placeholder { color: rgba(255,255,255,0.2); }

  .save-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 28px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
    margin-top: 14px;
  }
  .save-btn:hover { opacity: 0.85; }

  /* ── History ── */
  .history-title {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    margin-bottom: 12px;
  }
  .history-scroll { max-height: 460px; overflow-y: auto; }
  .history-item {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .history-week { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .history-text {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .history-empty {
    padding: 24px;
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">

  <!-- ════════ DASHBOARD VIEW ════════ -->
  <div id="dashboardView" class="dashboard-view">

    <!-- Banner -->
    <div class="banner">
      <div class="banner-inner">
        <div>
          <div class="banner-label">2026年度目标</div>
          <div class="banner-title">Balance · Diversify · Outstanding</div>
          <div class="banner-sub" id="bannerSub"></div>
        </div>
        <div class="ring-wrap">
          <div class="ring-container">
            <svg width="80" height="80" id="totalRing">
              <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
              <circle cx="40" cy="40" r="34" fill="none" stroke="var(--cyan)" stroke-width="6"
                stroke-dasharray="213.6" stroke-dashoffset="213.6" stroke-linecap="round" id="ringCircle"/>
            </svg>
            <div class="ring-text" id="ringText">0%</div>
          </div>
          <div class="ring-info">
            总体完成度<br><strong id="goodCount">0</strong> 个目标进展良好
          </div>
        </div>
      </div>
    </div>

    <!-- Cards -->
    <div class="cards-grid" id="cardsGrid"></div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>
  </div>

  <!-- ════════ DETAIL VIEW ════════ -->
  <div id="detailView" class="detail-view">
    <div class="detail-header">
      <button class="back-btn" onclick="showDashboard()">← 返回</button>
      <div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-sub" id="detailSub"></div>
      </div>
    </div>

    <div class="week-selector">
      <label>选择周次：</label>
      <select class="week-select" id="weekSelect" onchange="onWeekChange()"></select>
      <button class="week-today-btn" id="todayBtn" onclick="goToCurrentWeek()">回到本周</button>
    </div>

    <div class="detail-grid">
      <!-- Editor -->
      <div>
        <div class="editor-panel" id="editorPanel">
          <div class="editor-goal-header">
            <span class="editor-icon" id="editorIcon"></span>
            <div>
              <div class="editor-name" id="editorName"></div>
              <div class="editor-detail" id="editorDetail"></div>
            </div>
          </div>
          <div class="slider-section">
            <div class="slider-header">
              <span class="slider-label">总体进度</span>
              <span class="slider-value" id="sliderValue">0%</span>
            </div>
            <input type="range" min="0" max="100" value="0" id="progressSlider" oninput="onSliderChange()">
          </div>
          <div>
            <div class="note-label">本周进展记录</div>
            <textarea class="note-textarea" id="noteArea"
              placeholder="记录本周在这个目标上的具体进展、反思、下周计划..."></textarea>
          </div>
          <button class="save-btn" id="saveBtn" onclick="saveEntry()">保存记录</button>
        </div>
      </div>

      <!-- History -->
      <div>
        <div class="history-title">📋 历史记录</div>
        <div class="history-scroll" id="historyPanel"></div>
      </div>
    </div>
  </div>

</div>

<script>
// ── Data ──
const GOALS = [
  { id:1, name:"习惯管理", detail:"运动、睡眠、时间管理", thinking:"高效精英人生", icon:"⚡", color:"#00d4ff" },
  { id:2, name:"阅读", detail:"精读+碎片化读；建立自传库", thinking:"引导深度思考及读自传发挥共情能力", icon:"📖", color:"#a78bfa" },
  { id:3, name:"KKA体系建立", detail:"开始通过有效的互动加深关系，通过产生价值、帮助与寻求帮助", thinking:"互动加深关系", icon:"🤝", color:"#f472b6" },
  { id:4, name:"复盘体系建立", detail:"周复盘和月复盘，加深深度", thinking:"周复盘+月复盘", icon:"🔄", color:"#34d399" },
  { id:5, name:"思考力和Attend to Detail", detail:"在新风需要字的最重要的东西", thinking:"Push to next level，让思考升维", icon:"🧠", color:"#fbbf24" },
  { id:6, name:"主动犯错", detail:"不怕犯错，创业和创投需要GTD的人", thinking:"Don't over think", icon:"🔥", color:"#f87171" },
  { id:7, name:"管理时间", detail:"感受时间颗粒度，提高单位时间使用效率", thinking:"严格管理时间提效", icon:"⏱️", color:"#60a5fa" },
  { id:8, name:"项目管理", detail:"Leverage，安排工作，调动各方力量", thinking:"Leverage, smart way of doing things", icon:"🎯", color:"#c084fc" },
];

const STORAGE_KEY = "goal_tracker_2026";

// ── State ──
let state = loadState();
let currentGoalId = null;
let currentWeek = getWeekNumber(new Date());

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const s = { progress: {}, entries: {} };
  GOALS.forEach(g => { s.progress[g.id] = 0; s.entries[g.id] = {}; });
  return s;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const ys = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - ys) / 86400000 + 1) / 7);
}

function statusColor(p) {
  return p >= 70 ? 'var(--green)' : p >= 40 ? 'var(--yellow)' : 'var(--red)';
}

// ── Render Dashboard ──
function renderDashboard() {
  const totalP = Math.round(GOALS.reduce((s,g) => s + (state.progress[g.id]||0), 0) / GOALS.length);
  const totalEntries = GOALS.reduce((s,g) => s + Object.keys(state.entries[g.id]||{}).length, 0);
  const nowWeek = getWeekNumber(new Date());

  // Banner
  document.getElementById('bannerSub').textContent = `当前 第${nowWeek}周 · 已记录 ${totalEntries} 条周记`;

  // Ring
  const circumference = 2 * Math.PI * 34;
  const offset = circumference - (totalP / 100) * circumference;
  const circle = document.getElementById('ringCircle');
  circle.style.transition = 'stroke-dashoffset 0.8s ease';
  circle.setAttribute('stroke-dashoffset', offset);
  document.getElementById('ringText').textContent = totalP + '%';

  const goodNum = GOALS.filter(g => (state.progress[g.id]||0) >= 70).length;
  document.getElementById('goodCount').textContent = goodNum;

  // Cards
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  GOALS.forEach(g => {
    const p = state.progress[g.id] || 0;
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.onclick = () => showDetail(g.id);
    card.innerHTML = `
      <div class="glow" style="background:radial-gradient(circle,${g.color}15,transparent)"></div>
      <div class="card-header">
        <div class="card-left">
          <span class="card-icon">${g.icon}</span>
          <div>
            <div class="card-name">${g.name}</div>
            <div class="card-detail">${g.detail}</div>
          </div>
        </div>
        <div class="card-percent" style="color:${statusColor(p)}">${p}%</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${p}%;background:linear-gradient(90deg,${g.color},${g.color}88)"></div>
      </div>
      <div class="card-thinking">💡 ${g.thinking}</div>
    `;
    grid.appendChild(card);
  });

  // Stats
  const needAttention = GOALS.filter(g => { const pp = state.progress[g.id]||0; return pp>=40 && pp<70; }).length;
  const notStarted = GOALS.filter(g => (state.progress[g.id]||0) < 40).length;
  const stats = [
    { label:"进展良好", value:goodNum, suffix:"个", color:"var(--green)" },
    { label:"需要关注", value:needAttention, suffix:"个", color:"var(--yellow)" },
    { label:"待启动", value:notStarted, suffix:"个", color:"var(--red)" },
    { label:"已过周数", value:nowWeek, suffix:"/52", color:"var(--blue)" },
  ];
  const bar = document.getElementById('statsBar');
  bar.innerHTML = '';
  stats.forEach(s => {
    const d = document.createElement('div');
    d.className = 'stat-card';
    d.innerHTML = `
      <div class="stat-value" style="color:${s.color}">${s.value}<span class="stat-suffix">${s.suffix}</span></div>
      <div class="stat-label">${s.label}</div>
    `;
    bar.appendChild(d);
  });
}

// ── Detail View ──
function showDetail(goalId) {
  currentGoalId = goalId;
  currentWeek = getWeekNumber(new Date());

  document.getElementById('dashboardView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');

  const g = GOALS.find(x => x.id === goalId);

  document.getElementById('detailTitle').textContent = g.icon + ' ' + g.name;
  document.getElementById('detailSub').textContent = g.thinking;
  document.getElementById('editorPanel').style.borderColor = g.color + '44';
  document.getElementById('editorIcon').textContent = g.icon;
  document.getElementById('editorName').textContent = g.name;
  document.getElementById('editorDetail').textContent = g.detail;

  const todayBtn = document.getElementById('todayBtn');
  todayBtn.style.color = g.color;
  todayBtn.style.borderColor = g.color + '44';
  todayBtn.style.background = g.color + '22';

  // Week selector
  const sel = document.getElementById('weekSelect');
  sel.innerHTML = '';
  for (let i = 1; i <= 52; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `第${i}周`;
    if (i === currentWeek) opt.selected = true;
    sel.appendChild(opt);
  }

  loadWeekData();
  renderHistory();
}

function showDashboard() {
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('dashboardView').classList.remove('hidden');
  renderDashboard();
}

function onWeekChange() {
  currentWeek = Number(document.getElementById('weekSelect').value);
  loadWeekData();
}

function goToCurrentWeek() {
  currentWeek = getWeekNumber(new Date());
  document.getElementById('weekSelect').value = currentWeek;
  loadWeekData();
}

function loadWeekData() {
  const g = GOALS.find(x => x.id === currentGoalId);
  const p = state.progress[currentGoalId] || 0;
  const entry = (state.entries[currentGoalId] || {})[currentWeek] || '';

  document.getElementById('progressSlider').value = p;
  document.getElementById('sliderValue').textContent = p + '%';
  document.getElementById('sliderValue').style.color = g.color;
  document.getElementById('progressSlider').style.accentColor = g.color;
  document.getElementById('noteArea').value = entry;

  const btn = document.getElementById('saveBtn');
  btn.style.background = `linear-gradient(135deg, ${g.color}, ${g.color}aa)`;
  btn.textContent = '保存记录';
}

function onSliderChange() {
  const v = document.getElementById('progressSlider').value;
  const g = GOALS.find(x => x.id === currentGoalId);
  document.getElementById('sliderValue').textContent = v + '%';
}

function saveEntry() {
  const text = document.getElementById('noteArea').value;
  const progress = Number(document.getElementById('progressSlider').value);

  state.progress[currentGoalId] = progress;
  if (!state.entries[currentGoalId]) state.entries[currentGoalId] = {};
  if (text.trim()) {
    state.entries[currentGoalId][currentWeek] = text;
  } else {
    delete state.entries[currentGoalId][currentWeek];
  }
  saveState();

  const g = GOALS.find(x => x.id === currentGoalId);
  const btn = document.getElementById('saveBtn');
  btn.style.background = 'linear-gradient(135deg, var(--green), #059669)';
  btn.textContent = '✓ 已保存';
  setTimeout(() => {
    btn.style.background = `linear-gradient(135deg, ${g.color}, ${g.color}aa)`;
    btn.textContent = '保存记录';
  }, 1500);

  renderHistory();
}

function renderHistory() {
  const g = GOALS.find(x => x.id === currentGoalId);
  const entries = state.entries[currentGoalId] || {};
  const weeks = Object.keys(entries).map(Number).sort((a,b) => b-a);
  const panel = document.getElementById('historyPanel');

  if (weeks.length === 0) {
    panel.innerHTML = '<div class="history-empty">暂无历史记录</div>';
    return;
  }

  panel.innerHTML = '';
  weeks.forEach(w => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="history-week" style="color:${g.color}">第${w}周</div>
      <div class="history-text">${escapeHtml(entries[w])}</div>
    `;
    panel.appendChild(item);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Init ──
renderDashboard();
</script>
